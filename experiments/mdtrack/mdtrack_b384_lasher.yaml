DATA:
  MAX_SAMPLE_INTERVAL: 400
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  - 0.449
  - 0.449
  - 0.449
  SEARCH:
    CENTER_JITTER: 4.5
    FACTOR: 5.0
    SCALE_JITTER: 0.5
    SIZE: 384
    NUMBER: 2
  STD:
  - 0.229
  - 0.224
  - 0.225
  - 0.226
  - 0.226
  - 0.226
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 192
    NUMBER: 5
  TRAIN:
    DATASETS_NAME:
    - LasHeR_train
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 30000 #15000
  MULTI_MODAL_VISION: True # vision multi-modal
  TASK_INDEX: 0
MODEL:
  ENCODER:
    TYPE: fastitpnb
    STRIDE: 16
    PRETRAIN_TYPE: '/pretrained/fast_itpn_base_clipl_e1600.pt'
    DROP_PATH: 0.1
    POS_TYPE: index # index or interpolate
    TOKEN_TYPE_INDICATE: True
    INTERACTION_INDEXES: [[8, 14], [14, 20], [20, 26],[26,32]]
    GRAD_CKPT: True
  NECK:
    D_MODEL: 512
  DECODER:
    TYPE: CENTER
    NUM_CHANNELS: 256
TRAIN:
  ENCODER_MULTIPLIER: 0.1
  BATCH_SIZE: 4 #24 #32
  EPOCH: 30
  GRAD_CLIP_NORM: 0.1
  LR: 0.00002 #0.0000125 #0.0001
  LR_DROP_EPOCH: 24
  NUM_WORKER: 10
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  WEIGHT_DECAY: 0.0001
TEST:
  EPOCH: 10
  SEARCH_FACTOR: 5.0
  SEARCH_SIZE: 384
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 192
  WINDOW: True
  NUM_TEMPLATES: 3
  UPT:
    LASHER: 0.75

  UPH:
    LASHER: 0.87 #0.88

  INTER:
    LASHER: 70

  MB:
    LASHER: 500
